<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omex® Packaged Drinking Water</title>
    <style>
        :root {
            --primary-blue: #0A74DA;
            --dark-blue: #054A91;
            --dark-black: #000000;
            --deep-navy: #0B2545;
            --light-bg: #EEF4F8;
            --card-bg: #FFFFFF;
            --accent-cyan: #E0F2FE;
            --text-dark: #1E293B;
            --text-muted: #64748B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(38, 34, 98);
            color: var(--deep-navy);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .splash-image {
            width: 20.5rem;
            height: auto;
            margin-bottom: 20px;
        }

        .brand-text {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--dark-blue);
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        .loader-bar {
            width: 150px;
            height: 10px;
            background-color: #E2E8F0;
            margin-top: 45px;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--dark-blue));
            animation: loading 5s linear forwards;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        /* PAGE 2: MAIN PRODUCT CONTENT (Colorized Layout Upgrade) */
        #main-content {
            display: none;
            width: 100%;
            max-width: 430px;
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(11, 37, 69, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .product-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-title {
            color: var(--deep-navy);
            font-size: 2.2rem;
            font-weight: 800;
        }

        .product-tag {
            font-size: 0.85rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Enhanced Specification Cards */
        .info-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: linear-gradient(180deg, #FFFFFF 0%, var(--accent-cyan) 100%);
            border: 2px solid #010101;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(10, 116, 218, 0.04);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            ;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark-black);
        }

        /* INTERACTIVE SEARCH SECTOR */
        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #000000;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            background-color: #F8FAFC;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(10, 116, 218, 0.1);
        }

        /* BRANDED DYNAMIC PLANT PANEL */
        .result-panel {
            display: none;
            background: linear-gradient(145deg, var(--deep-navy) 0%, #1E3A8A 100%);
            color: #FFFFFF;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(11, 37, 69, 0.25);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-heading {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #93C5FD;
            margin-bottom: 15px;
            font-weight: 800;
            border-bottom: 1px solid rgba(147, 197, 253, 0.2);
            padding-bottom: 8px;
        }

        .address-text {
            line-height: 1.7;
            font-size: 0.95rem;
            color: #E2E8F0;
            font-weight: 400;
        }

        .address-text strong {
            color: #FFFFFF;
            font-size: 1.05rem;
        }

        .fssai-badge {
            margin-top: 7px;
            display: inline-flex;
            align-items: center;
            background: #ffffff;
            color: #000000;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-container input {
            width: 100%;
            padding: 12px 45px 12px 12px;
            /* extra space on right */
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .search-icon {
            position: absolute;
            right: 12px;
            /* moved to right */
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .search-icon:hover {
            color: #007bff;
        }
    </style>
</head>

<body>

    <!-- PAGE 1: SPLASH SCREEN (Featuring Your Local Design Asset) -->
    <div id="splash-screen">
        <div class="logo-container">
            <!-- Points explicitly to the verified logo design resource -->
            <img class="splash-image" src="pwd.svg" alt="Omex Logo" onerror="this.style.display='none';">
        </div>
        <div class="loader-bar">

    <!-- PAGE 2: COLORIZED MAIN PRODUCT HUB -->
    <div id="main-content">

                    <div class="info-value">Rs. 14/- <br>
                        <div class="info-label">Per 01 Litre</div>

                </div>
            </div>

                        <!-- Dynamic User Search Gate -->
                        <!-- <div class="search-container">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M21 21L15.8 15.8M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        <input type="text" id="batchSearch" class="search-input" placeholder="Type Batch No. (e.g., OX22)..." maxlength="2"
                            oninput="searchCode()">
                    
                        <p style="text-align: center; color: black; font-size: 16px; font-weight: 600;">Enter First two characters
                            of Batch no. in the search bar & search</p>
                    </div> -->

            <div class="search-container">
                <svg class="search-icon" id="searchIcon" viewBox="0 0 24 24" fill="none" onclick="searchCode()"
                    style="cursor: pointer;">
                    <path
                        d="M21 21L15.8 15.8M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z"
                        stroke="currentColor" stroke-width="4" stroke-linecap="round" />
                </svg>
                <input type="text" id="batchSearch" class="search-input" placeholder="Type Batch No. (e.g., OX22)..."
                    maxlength="2">
            </div>

            <p style="text-align: center; color: black; font-size: 16px; font-weight: 600;">Enter First two characters
                of Batch no. in the search bar & search</p>
        </div>

        <div id="plantDetails" class="result-panel">
            <div class="panel-heading">Manufactured By</div>
            <p class="address-text">
                <strong id="firmName"></strong>
            <div id="address"></div>
            <div class="fssai-badge">
                FSSAI No. <p id="fssai"> </p>
            </div>
        </div>
        </p>
    </div>
    </div>

</html>
