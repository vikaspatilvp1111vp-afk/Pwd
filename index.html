<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omex® Packaged Drinking Water</title>
    <style>
        :root {
            --primary-blue: #0A74DA;
            --dark-blue: #054A91;
            --dark-black: #000000;
            --deep-navy: #0B2545;
            --light-bg: #EEF4F8;
            --card-bg: #FFFFFF;
            --accent-cyan: #E0F2FE;
            --text-dark: #1E293B;
            --text-muted: #64748B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* PAGE 1: SPLASH SCREEN CONTAINER */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FFFFFF 0%, #F0F7FF 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: pulse 2.5s infinite ease-in-out;
        }

        /* Image Reference Setup for Splash Logo Asset */
        .splash-image {
            width: 20rem;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0px 10px 20px rgba(10, 116, 218, 0.15));
        }

        .brand-text {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--dark-blue);
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        .loader-bar {
            width: 150px;
            height: 5px;
            background-color: #E2E8F0;
            margin-top: 45px;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-blue), var(--dark-blue));
            animation: loading 5s linear forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* PAGE 2: MAIN PRODUCT CONTENT (Colorized Layout Upgrade) */
        #main-content {
            display: none; 
            width: 100%;
            max-width: 430px;
            background: var(--card-bg);
            padding: 35px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(11, 37, 69, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .product-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-title {
            color: var(--deep-navy);
            font-size: 2.2rem;
            font-weight: 800;
        }

        .product-tag {
            font-size: 0.85rem;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Enhanced Specification Cards */
        .info-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: linear-gradient(180deg, #FFFFFF 0%, var(--accent-cyan) 100%);
            border: 2px solid #010101;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(10, 116, 218, 0.04);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--dark-black);
        }

        /* INTERACTIVE SEARCH SECTOR */
        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #000000;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            background-color: #F8FAFC;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(10, 116, 218, 0.1);
        }

        /* BRANDED DYNAMIC PLANT PANEL */
        .result-panel {
            display: none;
            background: linear-gradient(145deg, var(--deep-navy) 0%, #1E3A8A 100%);
            color: #FFFFFF;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(11, 37, 69, 0.25);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-heading {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #93C5FD;
            margin-bottom: 15px;
            font-weight: 800;
            border-bottom: 1px solid rgba(147, 197, 253, 0.2);
            padding-bottom: 8px;
        }

        .address-text {
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #E2E8F0;
            font-weight: 400;
        }

        .address-text strong {
            color: #FFFFFF;
            font-size: 1.05rem;
        }

        .fssai-badge {
            display: inline-flex;
            align-items: center;
            background: #10B981;
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <!-- PAGE 1: SPLASH SCREEN (Featuring Your Local Design Asset) -->
    <div id="splash-screen">
        <div class="logo-container">
            <!-- Points explicitly to the verified logo design resource -->
            <img class="splash-image" src="pwd-logo.svg" alt="Omex Logo" onerror="this.style.display='none';">
        </div>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <!-- PAGE 2: COLORIZED MAIN PRODUCT HUB -->
    <div id="main-content">
        <div class="product-header">
             <div class="logo-container">
            <!-- Points explicitly to the verified logo design resource -->
            <img class="splash-image" src="pwd-logo.svg" alt="Omex Logo" onerror="this.style.display='none';">
        </div>
            <!-- <h1 class="product-title">Omex®</h1> -->
            <!-- <div class="product-tag">Packaged Drinking Water</div> -->
        </div>

        <!-- Segmented Technical Data Grid -->
        <div class="info-container">
            <div class="info-card">
                <div class="info-label">Quantity</div>
                <div class="info-value" >1000 ML</div>
            </div>
            <div class="info-card">
                <div class="info-label">Retail Price</div>
                <div class="info-value">Rs. 14/- <br> <div class="info-label" >Per 01 Litre</div></div>
            </div>
        </div>

        <!-- Dynamic User Search Gate -->
        <div class="search-box">
            <input type="text" id="batchSearch" class="search-input" placeholder="Type Batch No. (e.g., OX22)..." maxlength="10">
            <p style="text-align: center; color: black; font-size: 16px; font-weight: 600;">Enter First two characters of Batch no. in the search bar & search</p>
        </div>

        <!-- High-Contrast Factory Metadata Drawer -->
        <div id="plantDetails" class="result-panel">
            <div class="panel-heading">Production Facility</div>
            <p class="address-text">
                <strong>Omex Package Drinking Water</strong>
                <br>
                Plot no. 27-28,Main Road,
                <br>
                Awaam Nagar,ITARSI 461111,
                <br>
                Dist. Narmadapuram (MP), India.
            </p>
            <div class="fssai-badge">
                FSSAI Lic No: 10021051000142
            </div>
        </div>
    </div>

    <script>
        // Managing Splash and Main Board visibility timing thresholds (5-second block)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                main.style.display = 'block';
            }, 5000); 
        });

        // Interactive validation handling character matching
        const searchInput = document.getElementById('batchSearch');
        const resultPanel = document.getElementById('plantDetails');

        searchInput.addEventListener('input', (e) => {
            const queryValue = e.target.value.trim();
            if (queryValue.length >= 2) {
                resultPanel.style.display = 'block';
            } else {
                resultPanel.style.display = 'none';
            }
        });
    </script>
</body>
</html>
